<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intense-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="drop3d" cx="45%" cy="65%" r="60%" fx="40%" fy="55%">
      <stop offset="0%" stop-color="#ff2e2e" />
      <stop offset="40%" stop-color="#b50606" />
      <stop offset="85%" stop-color="#540000" />
      <stop offset="100%" stop-color="#1c0101" />
    </radialGradient>

    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="floor-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1212" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#ff1212" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ff1212" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g transform="translate(400, 410)">
    <ellipse cx="0" cy="0" rx="200" ry="45" fill="url(#floor-glow)" />
    <ellipse cx="0" cy="0" rx="160" ry="35" fill="none" stroke="#ff1212" stroke-width="1.5" stroke-opacity="0.4" filter="url(#glow)" />
    <ellipse cx="0" cy="0" rx="110" ry="22" fill="none" stroke="#ff1212" stroke-width="2" stroke-opacity="0.6" filter="url(#glow)" />
  </g>

  <path d="M 0,260 
           L 50,260 
           Q 75,260 90,240 
           T 110,270 
           L 115,310 
           L 135,170 
           L 155,290 
           L 165,260 
           L 250,260
           Q 270,260 285,245
           T 310,240
           L 330,260
           L 470,260
           Q 590,260 610,240
           T 635,245
           L 660,260
           L 680,150
           L 705,330
           L 725,235
           L 740,260
           L 800,260" 
        fill="none" 
        stroke="#ff1a1a" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#intense-glow)" />

  <g transform="translate(400, 245)">
    <path d="M 0,-190 C 70,-70 115,0 115,50 A 115,115 0 0,1 -115,50 C -115,0 -70,-70 0,-190 Z" 
          fill="#ff0000" opacity="0.15" filter="url(#glow)" transform="scale(1.1) translate(0, -10)"/>

    <path d="M 0,-190 C 70,-70 115,0 115,50 A 115,115 0 0,1 -115,50 C -115,0 -70,-70 0,-190 Z" 
          fill="url(#drop3d)" />

    <path d="M -10,-175 C 35,-75 85,-10 80,40 C 70,5 30,-55 -10,-150 Z" 
          fill="url(#highlight)" opacity="0.7"/>
          
    <path d="M 0,-190 C 70,-70 115,0 115,50 A 115,115 0 0,1 -115,50 C -115,0 -70,-70 0,-190 Z" 
          fill="none" stroke="#120000" stroke-width="4" opacity="0.6"/>
  </g>
</svg>
